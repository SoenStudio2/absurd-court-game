<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Абсурдный Суд Онлайн</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn { background: #e67e22; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #d35400; }
        .btn-guilty { background: #c0392b; font-size: 20px; padding: 15px 30px; }
        .btn-innocent { background: #27ae60; font-size: 20px; padding: 15px 30px; }
        .btn-next { background: #9b59b6; margin-top: 15px; width: 100%; font-weight: bold; }
        .btn-next:hover { background: #8e44ad; }
        .card { display: inline-block; background: #ecf0f1; color: #2c3e50; padding: 15px; margin: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 5px rgba(0,0,0,0.3); }
        .card:hover { background: #bdc3c7; }
        .table-clue { background: #f1c40f; color: black; padding: 10px; margin: 5px; border-radius: 3px; display: inline-block; font-weight: bold;}
        #judge-panel { display: none; margin-top: 20px; padding: 15px; background: #16a085; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ Абсурдный Суд</h1>
        <div id="lobby">
            <h3>Игроков в лобби: <span id="player-count">0</span>/6 (Минимум 4)</h3>
            <button class="btn" id="start-btn" onclick="startGame()">Начать игру</button>
        </div>

        <div id="game-zone" style="display:none;">
            <h2>Таймер: <span id="timer">30:00</span> | Раунд (Шаг): <span id="round-num">1</span></h2>
            <div style="background: #2980b9; padding: 15px; border-radius: 5px; font-size: 18px; margin-bottom: 20px;">
                <strong>Дело:</strong> <span id="case-text">Загрузка...</span>
            </div>

            <div style="margin: 20px 0;">
                <h3>Твоя Роль: <span id="my-role" style="color: #f1c40f;">-</span></h3>
                <p style="background: #c0392b; padding: 10px; display:inline-block; border-radius: 5px;">
                    ⚠️ <strong>Твоя особенность:</strong> <span id="my-quirk">-</span>
                </p>
            </div>

            <h3>Общий стол улик:</h3>
            <div id="table-clues" style="min-height: 50px; background: #233142; padding: 10px; border-radius: 5px; margin-bottom: 20px;"></div>

            <h3 id="clues-title">Твои улики (кликни, чтобы выложить):</h3>
            <div id="my-clues"></div>

            <div id="judge-panel">
                <h3>ПАНЕЛЬ СУДЬИ</h3>
                <button class="btn btn-guilty" onclick="sendVerdict(true)">🔴 ВИНОВЕН</button>
                <button class="btn btn-innocent" onclick="sendVerdict(false)">🟢 НЕ ВИНОВЕН</button>
                <hr style="border-color: #1abc9c;">
                <button class="btn btn-next" onclick="nextRound()">➡️ СЛЕДУЮЩИЙ ШАГ РАУНДА</button>
            </div>
        </div>
    </div>

    <script {timestamp=2026-06-25}>
        const socket = io();
        let myRole = "";

        socket.on('update_players', (players) => {
            document.getElementById('player-count').innerText = players.length;
        });

        function startGame() { socket.emit('start_game'); }
        function nextRound() { socket.emit('next_round'); }
        function sendVerdict(isGuilty) { socket.emit('verdict', isGuilty); }

        socket.on('init_role', (data) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-zone').style.display = 'block';
            
            myRole = data.role;
            document.getElementById('my-role').innerText = data.role;
            document.getElementById('my-quirk').innerText = data.quirk;

            // Показываем панель управления только Судье
            document.getElementById('judge-panel').style.display = (data.role === "Судья") ? "block" : "none";
            
            // Отрисовка личных карт улик
            const cluesDiv = document.getElementById('my-clues');
            cluesDiv.innerHTML = "";
            if(!data.clues || data.clues.length === 0) {
                document.getElementById('clues-title').innerText = (data.role === "Судья" || data.role === "Обвиняемый") ? 
                    "У тебя нет улик по роли." : "Ты выложил все свои улики на этом этапе.";
            } else {
                document.getElementById('clues-title').innerText = "Твои улики (кликни, чтобы выложить):";
                data.clues.forEach(clue => {
                    let card = document.createElement('div');
                    card.className = 'card';
                    card.innerText = clue;
                    card.onclick = () => socket.emit('play_clue', clue);
                    cluesDiv.appendChild(card);
                });
            }
        });

        socket.on('update_state', (state) => {
            document.getElementById('case-text').innerText = state.currentCase;
            document.getElementById('round-num').innerText = state.round;
            
            const tableDiv = document.getElementById('table-clues');
            tableDiv.innerHTML = "";
            state.tableClues.forEach(c => {
                let div = document.createElement('div');
                div.className = 'table-clue';
                div.innerText = `[${c.from}]: ${c.text}`;
                tableDiv.appendChild(div);
            });
        });

        socket.on('timer_tick', (seconds) => {
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        });

        socket.on('game_over', (msg) => {
            alert("ПРИГОВОР ВЫНЕСЕН!\n\n" + msg);
            location.reload();
        });

        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
